# MSYS2 MinGW64 configuration for NetRadiant
# Copy this to Makefile.conf

OS = Win32

# pkg-config (pkgconf from mingw-w64-x86_64-pkgconf)
PKGCONFIG ?= /mingw64/bin/pkgconf

# Other tools
GIT ?= git
SVN ?= svn
WGET ?= wget
UNZIPPER ?= unzip

# Build settings
BUILD = release
RADIANT_ABOUTMSG = MSYS2 MinGW64 build
